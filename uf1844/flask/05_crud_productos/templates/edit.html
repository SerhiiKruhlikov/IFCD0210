<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit de tarea</title>
</head>
<body>

  <h1>Edit de tarea</h1>

  {% if tarea %}
  <form method="post">
      <input type="text" name="description" placeholder="Nueva tarea" value="{{ tarea.description }}" required>
      <button type="submit">Guardar</button>
  </form>
  {% endif %}

</body>
</html>
