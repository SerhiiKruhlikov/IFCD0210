<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>Micro:bit</title>

	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
	<header>
		<div class="wrapper">
			<div class="row">
				<div class="column left">
					<a href="{{ url_for('home') }}" class="logo">
						<img src="{{ url_for('static', filename='images/logo.svg') }}" alt="Micro:bit" />
					</a>
				</div>
				<div class="column right">
					<img src="{{ url_for('static', filename='/images/dc.svg') }}" alt="Developer Community" />
				</div>
				<div class="clear"></div>
			</div>
			<nav class="right">
				<ul>
					<li><a href="{{ url_for('software') }}">Software</a></li>
					<li><a href="{{ url_for('firmware') }}">Firmware</a></li>
					<li><a href="#hardware">Hardware</a></li>
					<li><a href="#accessories">Accessories</a></li>
					<li><a href="#community">Community</a></li>
					<li><a href="#r&d">R&D</a></li>
					<li><a href="#edit">Edit</a></li>
				</ul>
			</nav>
		</div>
	</header>
	<main>
		{% block content%} {% endblock %}
	</main>
	<footer>
		<div class="wrapper">
			<nav>
				<ul>
					<li><a href="{{ url_for('software') }}">Software</a></li>
					<li><a href="{{ url_for('firmware') }}">Firmware</a></li>
					<li><a href="#hardware">Hardware</a></li>
					<li><a href="#accessories">Accessories</a></li>
					<li><a href="#community">Community</a></li>
					<li><a href="#r&d">R&D</a></li>
					<li><a href="#edit">Edit</a></li>
				</ul>
			</nav>
			<p>
				&copy; Copyright 2025 Micro:bit Educational Foundation
			</p>
		</div>
	</footer>
</body>
</html>
