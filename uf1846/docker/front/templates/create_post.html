{% extends 'base.html' %}

{% block content %}
	<h2>Login</h2>
	<form action="" method="post">
		<label for="titulo">Titulo</label>
		<input type="text" name="titulo" id="titulo" value="{{post.titulo if post}}">
		<br>
		<label for="contenido">Contenido</label>
		<textarea name="contenido" id="contenido">
			{{post.contenido if post}}
		</textarea>
		<br>
		<label for="estado">Estado</label>
		<select name="estado" id="estado">
			<option value="borrador" {{'selected' if post.estado == 'borrador'}}>Borrador</option>
			<option value="publicar" {{'selected' if post.estado == 'publicado'}}>publicar</option>
		</select>
		<br>
		<input type="submit" value="Crear">
	</form>
	<a href="/">Volver</a>
{% endblock %}
